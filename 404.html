<!--
  /o/SLUG — FB IAB escape redirector. Runs in <head> BEFORE the body parses,
  so the redirect happens with zero visible spinner. Critical for perceived speed.
-->
<script>
(function(){
  var p = location.pathname;
  var m = p.match(/^\/o\/([a-z2-9]{4,16})\/?$/);
  if (!m) return;
  var slug = m[1];
  if (window.gtag) gtag('event', 'wrap_click', { slug: slug });

  // Plant AE affiliate cookies in background (passive earning)
  try {
    ['https://s.click.aliexpress.com/e/_c4kBQ3qf','https://s.click.aliexpress.com/e/_c3v5kHNv','https://s.click.aliexpress.com/e/_c4kHsRZZ'].forEach(function(u){
      var img = new Image();
      img.referrerPolicy = 'no-referrer-when-downgrade';
      img.src = u + '?t=' + Date.now();
    });
  } catch(e){}

  // Fetch destination + redirect (started immediately, before DOM)
  fetch('https://ali-landing.ohadf1976.workers.dev/api/unwrap/' + slug)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!data.url) return;
      var destUrl = data.url;
      var ua = navigator.userAgent || '';
      var isAndroid = /Android/i.test(ua);
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var iab = /FBAN|FBAV|FB_IAB|Instagram|TikTok|musical_ly|BytedanceWebview|LinkedInApp|Snapchat|MicroMessenger/i.test(ua);

      if (iab && isAndroid) {
        var noProto = destUrl.replace(/^https?:\/\//, '');
        var intentUrl = 'intent://' + noProto +
          '#Intent;scheme=https;action=android.intent.action.VIEW;' +
          'S.browser_fallback_url=' + encodeURIComponent(destUrl) + ';end';
        location.replace(intentUrl);
        setTimeout(function(){ location.replace(destUrl); }, 1500);
      } else if (iab && isIOS) {
        var safariUrl = destUrl.replace(/^https:\/\//, 'x-safari-https://');
        try { location.href = safariUrl; } catch(e){}
        // After 800ms show overlay (DOM must be ready by then)
        setTimeout(function(){
          if (!document.body) { setTimeout(arguments.callee, 100); return; }
          document.body.innerHTML =
            '<div style="position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;direction:rtl;font-family:Heebo,Assistant,sans-serif">' +
              '<div style="font-size:64px;margin-bottom:16px">🛍️</div>' +
              '<div style="font-size:22px;font-weight:800;margin-bottom:18px;color:#222">לחווית קנייה טובה יותר<br>פתחי דף זה ב-Safari</div>' +
              '<div style="font-size:16px;line-height:1.8;max-width:340px;color:#555">' +
                '1️⃣ לחצי על <strong style="background:#f5f5f5;color:#000;padding:2px 10px;border-radius:6px">⋯</strong> או <strong style="background:#f5f5f5;color:#000;padding:2px 10px;border-radius:6px">⫶</strong> למעלה<br><br>' +
                '2️⃣ בחרי <strong>"Open in Safari"</strong>' +
              '</div>' +
              '<a href="' + destUrl + '" style="margin-top:32px;background:linear-gradient(90deg,#ff3030,#ff6b35);color:#fff;text-decoration:none;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:700">המשך כאן בכל זאת ←</a>' +
            '</div>';
        }, 800);
      } else {
        location.replace(destUrl);
      }
    })
    .catch(function(){
      // On error, just go to homepage
      location.replace('https://alifindme.com/');
    });
})();
</script>
<style>
  body { margin:0; padding:0; font-family:'Heebo','Assistant',-apple-system,sans-serif; background:#fff; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .loader { text-align:center; }
  .spinner { width:48px; height:48px; border:4px solid #ffe0d6; border-top-color:#ff5722; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .msg { color:#666; font-size:15px; }
  .err { display:none; }
  .err.show { display:block; color:#999; }
  .err a { color:#ff5722; text-decoration:none; font-weight:600; }
</style>

<div class="loader">
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">טוען את המוצר...</div>
  <div class="err" id="err">
    <h1 style="color:#333;font-size:24px">העמוד לא נמצא</h1>
    <p><a href="/">חזרה לעמוד הבית</a></p>
  </div>
</div>

<script>
(function() {
  var path = window.location.pathname;

  // /go/<slug> → numeric productId goes to ae-cart, otherwise legacy ali-findme-api
  if (path.startsWith('/go/')) {
    var slug = path.replace('/go/', '').replace('/', '');
    if (slug && slug !== 'admin.html' && slug !== 'admin') {
      if (/^\d+$/.test(slug)) {
        window.location.replace('https://ae-cart.ohadf1976.workers.dev/go/' + slug);
      } else {
        window.location.replace('https://ali-findme-api.ohadf1976.workers.dev/go/' + slug);
      }
      return;
    }
  }

  // /o/<slug> handled in <head> script (faster — no DOM wait)
  if (/^\/o\/[a-z2-9]{4,16}\/?$/.test(path)) return;

  // /p/<slug> → ali-landing (Alibaba hidden products) via full-page iframe
  var aliLandingMatch = path.match(/^\/p\/([a-z2-9]{4,16})\/?$/);
  if (aliLandingMatch) {
    var alSlug = aliLandingMatch[1];
    if (window.gtag) gtag('event', 'ali_landing_view', { slug: alSlug, source: 'bridge_iframe' });
    var alIframe = document.createElement('iframe');
    var alQs = '?v=' + Math.floor(Date.now() / 60000);
    if (location.search) alQs += '&' + location.search.replace(/^\?/, '');
    alIframe.src = 'https://ali-landing.ohadf1976.workers.dev/p/' + alSlug + alQs;
    alIframe.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;border:0;margin:0;padding:0;z-index:9999;background:#fff;';
    alIframe.setAttribute('allow', 'fullscreen');
    alIframe.onload = function() {
      var loader = document.querySelector('.loader');
      if (loader) loader.style.display = 'none';
    };
    document.body.appendChild(alIframe);
    return;
  }

  // /s/<storeId> → render STORE landing page via full-page iframe
  var storeMatch = path.match(/^\/s\/(\d+)\/?$/);
  if (storeMatch) {
    var storeId = storeMatch[1];
    if (window.gtag) gtag('event', 'store_view', { store_id: storeId, source: 'bridge_iframe' });
    var sIframe = document.createElement('iframe');
    var sQs = '?v=' + Math.floor(Date.now() / 60000);
    if (location.search) sQs += '&' + location.search.replace(/^\?/, '');
    sIframe.src = 'https://ae-cart.ohadf1976.workers.dev/s/' + storeId + sQs;
    sIframe.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;border:0;margin:0;padding:0;z-index:9999;background:#fff;';
    sIframe.setAttribute('allow', 'fullscreen');
    sIframe.onload = function() {
      var loader = document.querySelector('.loader');
      if (loader) loader.style.display = 'none';
    };
    document.body.appendChild(sIframe);
    return;
  }

  // /c/<productId> → render landing page from ae-cart worker via full-page iframe (URL preserved)
  var cartMatch = path.match(/^\/c\/(\d+)\/?$/);
  if (cartMatch) {
    var productId = cartMatch[1];
    if (window.gtag) gtag('event', 'cart_view', { product_id: productId, source: 'bridge_iframe' });
    var iframe = document.createElement('iframe');
    // Cache-buster (changes every minute) bypasses any stale browser cache
    // of the worker page, AND forwards ?debug=1 / ?force_iab=1 if user added them.
    var qs = '?v=' + Math.floor(Date.now() / 60000);
    if (location.search) qs += '&' + location.search.replace(/^\?/, '');
    iframe.src = 'https://ae-cart.ohadf1976.workers.dev/c/' + productId + qs;
    iframe.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;border:0;margin:0;padding:0;z-index:9999;background:#fff;';
    iframe.setAttribute('allow', 'fullscreen');
    iframe.onload = function() {
      var loader = document.querySelector('.loader');
      if (loader) loader.style.display = 'none';
    };
    iframe.onerror = function() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').style.display = 'none';
      document.getElementById('err').classList.add('show');
    };
    document.body.appendChild(iframe);
    return;
  }

  // /buy/<productId> → fast 302 redirect through affiliate (alternative short link)
  var buyMatch = path.match(/^\/buy\/(\d+)\/?$/);
  if (buyMatch) {
    window.location.replace('https://ae-cart.ohadf1976.workers.dev/go/' + buyMatch[1]);
    return;
  }

  // Default 404 — show friendly error
  setTimeout(function() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    document.getElementById('err').classList.add('show');
  }, 200);
})();
</script>
</body>
