<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#ff6b8a">
  <title>העלאת פריט — סטייל מתגלגל</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="topbar">
  <button class="icon-btn" onclick="history.back()">→</button>
  <div class="logo" style="flex:1">העלאת פריט חדש</div>
</header>

<main class="container">
  <form id="uploadForm" class="form">

    <div>
      <label>תמונות (עד 5)</label>
      <div id="photoGrid" class="photo-grid"></div>
      <input type="file" id="photoInput" accept="image/*" multiple capture="environment" style="display:none">
      <p class="text-muted" style="margin-top:6px; font-size:12px">
        💡 התמונה הראשונה היא הראשית. תמונות ברורות = הרבה יותר פניות
      </p>
    </div>

    <div>
      <label>כותרת *</label>
      <input type="text" name="title" required maxlength="80" placeholder="למשל: שמלת זארה לבנה ארוכה">
    </div>

    <div>
      <label>תיאור</label>
      <textarea name="description" maxlength="500" placeholder="שמלת ערב מקסימה, נלבשה פעם אחת לחתונה..."></textarea>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px">
      <div>
        <label>קטגוריה *</label>
        <select name="category" required>
          <option value="">בחרי...</option>
        </select>
      </div>
      <div>
        <label>מחיר (₪) *</label>
        <input type="number" name="price" required min="1" max="999999" inputmode="numeric" placeholder="120">
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px">
      <div>
        <label>מותג</label>
        <input type="text" name="brand" maxlength="40" placeholder="זארה / H&M / ...">
      </div>
      <div>
        <label>מידה</label>
        <input type="text" name="size" maxlength="20" placeholder="S / M / 38 / ...">
      </div>
    </div>

    <div>
      <label>מצב הפריט *</label>
      <select name="condition" required>
        <option value="">בחרי...</option>
      </select>
    </div>

    <div>
      <label>עיר</label>
      <select name="city">
        <option value="">בחרי...</option>
      </select>
    </div>

    <button type="submit" class="btn" id="submitBtn">📤 פרסמי פריט</button>
  </form>
</main>

<script src="/app.js"></script>
<script>
// Auth check
if (!Auth.isLoggedIn()) {
  showLoginModal((user) => location.reload());
}

// Populate selects
document.querySelector('select[name="category"]').innerHTML +=
  Object.entries(CATEGORIES).map(([k, v]) => `<option value="${k}">${v}</option>`).join("");
document.querySelector('select[name="condition"]').innerHTML +=
  Object.entries(CONDITIONS).map(([k, v]) => `<option value="${k}">${v}</option>`).join("");
document.querySelector('select[name="city"]').innerHTML +=
  CITIES.map(c => `<option value="${c}">${c}</option>`).join("");

// Photo handling
const photos = []; // File[]
const grid = document.getElementById("photoGrid");
const photoInput = document.getElementById("photoInput");

function renderPhotos() {
  grid.innerHTML = "";
  photos.forEach((f, i) => {
    const slot = document.createElement("div");
    slot.className = "photo-slot";
    const url = URL.createObjectURL(f);
    slot.innerHTML = `<img src="${url}"><span class="remove" data-i="${i}">×</span>`;
    grid.appendChild(slot);
  });
  if (photos.length < 5) {
    const add = document.createElement("div");
    add.className = "photo-slot";
    add.innerHTML = "<span style='font-size:32px; color:#bbb'>+</span>";
    add.onclick = () => photoInput.click();
    grid.appendChild(add);
  }
  grid.querySelectorAll(".remove").forEach(b => {
    b.onclick = (e) => { e.stopPropagation(); photos.splice(+b.dataset.i, 1); renderPhotos(); };
  });
}

photoInput.onchange = async (e) => {
  for (const f of e.target.files) {
    if (photos.length >= 5) break;
    // Compress before upload
    const compressed = await compressImage(f);
    photos.push(compressed);
  }
  photoInput.value = "";
  renderPhotos();
};

async function compressImage(file, maxSize = 1200, quality = 0.85) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
      const w = img.width * ratio;
      const h = img.height * ratio;
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      canvas.toBlob((blob) => {
        resolve(new File([blob], file.name.replace(/\.\w+$/, ".jpg"), { type: "image/jpeg" }));
      }, "image/jpeg", quality);
    };
    img.src = URL.createObjectURL(file);
  });
}

renderPhotos();

// Submit
document.getElementById("uploadForm").onsubmit = async (e) => {
  e.preventDefault();
  if (photos.length === 0) return toast("הוסיפי לפחות תמונה אחת");

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "מעלה...";

  const fd = new FormData(e.target);
  photos.forEach(f => fd.append("photos", f));

  try {
    const res = await api("/api/items", { method: "POST", body: fd });
    toast("פורסם! 🎉");
    setTimeout(() => location.href = "/item.html?id=" + res.id, 1000);
  } catch (err) {
    toast(err.message);
    btn.disabled = false;
    btn.textContent = "📤 פרסמי פריט";
  }
};

renderBottomNav("upload");
</script>

</body>
</html>
