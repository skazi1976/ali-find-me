<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#ff6b8a">
  <title>הפרופיל שלי — סטייל מתגלגל</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<header class="topbar">
  <div class="logo" style="flex:1">הפרופיל שלי</div>
  <button class="icon-btn" id="logoutBtn" title="התנתקות">🚪</button>
</header>

<main class="container">
  <div id="profile"></div>
  <h3 style="margin: 24px 0 12px">הפריטים שלי</h3>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">
    <div class="emoji">🛍️</div>
    <h3>עוד לא העלית פריטים</h3>
    <a href="./upload.html" class="btn" style="display:inline-block; margin-top:12px">+ העלאת פריט</a>
  </div>
</main>

<script src="./app.js"></script>
<script>
if (!Auth.isLoggedIn()) {
  showLoginModal((u) => location.reload());
}

async function load() {
  const u = Auth.user();
  if (!u) return;

  document.getElementById("profile").innerHTML = `
    <div class="seller-card">
      <div class="seller-avatar">${u.name.charAt(0)}</div>
      <div style="flex:1">
        <div style="font-weight:700; font-size:18px">${u.name}</div>
        <div class="text-muted">📱 ${u.phone}</div>
      </div>
    </div>
  `;

  try {
    const res = await api("/api/me/items");
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    if (res.items.length === 0) {
      empty.style.display = "block";
    } else {
      grid.innerHTML = res.items.map(itemCard).join("");
    }
  } catch (err) { toast(err.message); }
}

document.getElementById("logoutBtn").onclick = async () => {
  if (!confirm("להתנתק?")) return;
  try { await api("/api/auth/logout", { method: "POST" }); } catch {}
  Auth.clear();
  location.href = "/";
};

renderBottomNav("profile");
load();
</script>
</body>
</html>
