<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin | Daily Deals</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Assistant', 'Heebo', sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
    }

    h1, h2, h3, label, button { font-family: 'Heebo', sans-serif; }

    /* Login Screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-box h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .login-box p {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .login-box input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: 'Assistant', sans-serif;
      margin-bottom: 12px;
      outline: none;
      text-align: center;
    }

    .login-box input:focus { border-color: #FF6B00; }

    .login-error {
      color: #ef4444;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    /* Admin Panel */
    .admin-panel { display: none; }

    .admin-header {
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-header h1 {
      font-size: 18px;
      color: #FF6B00;
    }

    .admin-header a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 13px;
    }

    /* Form */
    .form-section {
      max-width: 600px;
      margin: 20px auto;
      padding: 0 16px;
    }

    .form-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .form-card h2 {
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-family: 'Assistant', sans-serif;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: #FF6B00;
    }

    .form-group select { cursor: pointer; }
    .form-group select option { background: #1a1a2e; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Image Upload */
    .upload-zone {
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #FF6B00;
      background: rgba(255,107,0,0.05);
    }

    .upload-zone .icon { font-size: 36px; margin-bottom: 8px; }

    .upload-zone p {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
    }

    .upload-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* Image Previews */
    .image-previews {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .img-preview {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .img-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .img-preview .remove-img {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(239,68,68,0.9);
      border: none;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .img-preview .uploading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mini-spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #FF6B00;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Buttons */
    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #FF6B00, #FF8C40);
      color: #fff;
      width: 100%;
      justify-content: center;
    }

    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,0,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      padding: 8px 14px;
      font-size: 13px;
    }

    .btn-danger:hover { background: rgba(239,68,68,0.25); }

    /* Posts List */
    .posts-list { margin-top: 12px; }

    .post-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .post-thumb {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      object-fit: cover;
      background: #222;
    }

    .post-info { flex: 1; }
    .post-info .post-brand { font-size: 11px; color: #FF6B00; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .post-info .post-title { font-size: 14px; margin-top: 2px; }
    .post-info .post-meta { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }

    .post-actions { display: flex; gap: 6px; }

    .post-actions button {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
    }

    .post-actions button:hover { background: rgba(255,255,255,0.1); }
    .post-actions .delete-btn:hover { background: rgba(239,68,68,0.2); color: #ef4444; }

    /* Request Items */
    .req-item {
      padding: 12px;
      background: rgba(168,85,247,0.06);
      border: 1px solid rgba(168,85,247,0.12);
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .req-item .req-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .req-item .req-name {
      font-weight: 700;
      font-size: 14px;
      color: #a855f7;
    }

    .req-item .req-date {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }

    .req-item .req-msg {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
    }

    .req-item .req-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      margin-right: 8px;
    }

    .req-badge.new { background: rgba(168,85,247,0.2); color: #a855f7; }
    .req-badge.done { background: rgba(37,211,102,0.2); color: #25D366; }

    .req-count-badge {
      background: #a855f7;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-right: 8px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #25D366;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      z-index: 999;
      transition: transform 0.3s;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #ef4444; }

    /* Status */
    .status-bar {
      padding: 8px 16px;
      background: rgba(255,107,0,0.08);
      border-bottom: 1px solid rgba(255,107,0,0.15);
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>&#x1F512; Admin Panel</h1>
      <p>ניהול דילים יומיים</p>
      <div class="login-error" id="loginError">סיסמה שגויה</div>
      <input type="password" id="loginPassword" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn btn-primary" onclick="doLogin()">&#x1F511; כניסה</button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="adminPanel">

    <header class="admin-header">
      <h1>&#x2699;&#xFE0F; ניהול דילים</h1>
      <a href="index.html" target="_blank">&#x1F441; צפו בדף &larr;</a>
    </header>

    <div class="status-bar" id="statusBar">טוען...</div>

    <!-- Analytics Dashboard -->
    <div class="form-card" id="analyticsCard" style="margin:15px auto;max-width:800px">
      <h2 style="text-align:center;margin-bottom:15px">📊 סטטיסטיקות</h2>
      <div id="analyticsContent" style="text-align:center;color:#888">טוען נתונים...</div>
    </div>

    <!-- Product Requests -->
    <div class="form-card" id="requestsCard" style="margin:15px auto;max-width:800px">
      <h2 style="text-align:center;margin-bottom:15px">📩 בקשות מלקוחות <span id="requestsBadge" style="background:#FF6B00;color:#fff;border-radius:50%;padding:2px 8px;font-size:14px;display:none">0</span></h2>
      <div id="requestsContent" style="text-align:center;color:#888">טוען...</div>
    </div>

    <div class="form-section">

      <!-- New Post Form -->
      <div class="form-card">
        <h2>&#x2795; פוסט חדש</h2>

        <div class="form-row">
          <div class="form-group">
            <label>סוג</label>
            <select id="postType">
              <option value="daily">&#x1F525; דיל יומי</option>
              <option value="brand">&#x1F48E; מותג מוסתר</option>
            </select>
          </div>
          <div class="form-group">
            <label>תאריך</label>
            <input type="date" id="postDate">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>שם מותג</label>
            <input type="text" id="postBrand" placeholder="למשל: NIKE">
          </div>
          <div class="form-group">
            <label>מחיר (&#x20AA;)</label>
            <input type="number" id="postPrice" placeholder="199">
          </div>
        </div>

        <div class="form-group">
          <label>כותרת</label>
          <input type="text" id="postTitle" placeholder="תיאור קצר של המוצר">
        </div>

        <div class="form-group">
          <label>קישור לרכישה</label>
          <input type="url" id="postLink" placeholder="https://store.flylinking.com/g/...">
        </div>

        <div class="form-group">
          <label>טקסט מלא של הפוסט (אופציונלי)</label>
          <textarea id="postDescription" rows="5" placeholder="הכניסו כאן את הטקסט המלא של הפוסט — ייראה ללקוח בלחיצה על 'לצפייה בפרטים'" style="resize:vertical;"></textarea>
        </div>

        <div class="form-group">
          <label>תמונות</label>
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" multiple accept="image/*,video/mp4,video/quicktime">
            <div class="icon">&#x1F4F7;</div>
            <p>גררו תמונות או וידאו לכאן או לחצו לבחירה</p>
          </div>
          <div class="image-previews" id="imagePreviews"></div>
        </div>

        <button class="btn btn-primary" id="publishBtn" onclick="publishPost()">
          &#x1F680; פרסמו פוסט
        </button>
      </div>

      <!-- Existing Posts -->
      <div class="form-card">
        <h2>&#x1F4CB; פוסטים קיימים</h2>
        <div class="posts-list" id="postsList">
          <div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px">טוען...</div>
        </div>
      </div>

      <!-- Product Requests -->
      <div class="form-card">
        <h2>&#x1F4E9; בקשות מוצרים <span class="req-count-badge" id="reqCountBadge">0</span></h2>
        <div id="requestsList">
          <div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px">אין בקשות</div>
        </div>
        <button class="btn btn-danger" style="margin-top:12px;width:100%;justify-content:center" onclick="clearRequests()">&#x1F5D1; נקו הכל</button>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

<script>
// === CONFIG ===
const ADMIN_PASSWORD = 'deals2026';
const POSTS_JSON_URL = 'posts.json';
const R2_PUBLIC_URL = 'https://pub-0ad199860b5a4ce0b3fb483660b8a4ca.r2.dev';
const R2_UPLOAD_WORKER = 'https://ali-findme-api.ohadf1976.workers.dev';

let posts = [];
let uploadedImages = [];

// === AUTH ===
function doLogin() {
  const pwd = document.getElementById('loginPassword').value;
  if (pwd === ADMIN_PASSWORD) {
    localStorage.setItem('deals_admin', '1');
    showAdmin();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';

  // Set default date to today
  document.getElementById('postDate').value = todayStr();

  loadPosts();
  loadRequests();
  loadAnalytics();
  loadKVRequests();
}

// === ANALYTICS ===
async function loadAnalytics() {
  try {
    const resp = await fetch(`${R2_UPLOAD_WORKER}/deals/analytics?password=deals2026&days=7&t=${Date.now()}`);
    if (!resp.ok) throw new Error('Failed');
    const data = await resp.json();

    const labels = { page_view: '👁 צפיות', purchase_click: '🛒 רכישות', share: '📤 שיתופים', wa_share_bar: '💬 שיתוף WA', search: '🔍 חיפושים', broadcast_join: '📱 הצטרפויות', product_request: '📩 בקשות', pwa_popup_shown: '📲 פופאפ התקנה', pwa_installed: '✅ התקינו אפליקציה' };

    const today = todayStr();
    const yesterday = (() => { const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();

    // Sum weekly
    const weekly = {};
    Object.values(data).forEach(day => {
      Object.entries(day).forEach(([k, v]) => { weekly[k] = (weekly[k] || 0) + v; });
    });

    const todayData = data[today] || {};
    const yesterdayData = data[yesterday] || {};

    const makeRow = (label, d) => Object.entries(labels).map(([k, emoji]) => d[k] ? `<span style="margin:0 8px">${emoji} ${d[k]}</span>` : '').filter(Boolean).join('') || '<span style="color:#555">אין נתונים</span>';

    document.getElementById('analyticsContent').innerHTML = `
      <div style="display:grid;gap:10px;text-align:right">
        <div style="background:#1a1a2e;padding:12px;border-radius:8px">
          <strong style="color:#FF6B00">היום</strong><br>${makeRow('today', todayData)}
        </div>
        <div style="background:#1a1a2e;padding:12px;border-radius:8px">
          <strong style="color:#888">אתמול</strong><br>${makeRow('yesterday', yesterdayData)}
        </div>
        <div style="background:#1a1a2e;padding:12px;border-radius:8px">
          <strong style="color:#4CAF50">7 ימים אחרונים</strong><br>${makeRow('week', weekly)}
        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById('analyticsContent').innerHTML = '<span style="color:#ef4444">שגיאה בטעינת נתונים</span>';
  }
}

// === KV REQUESTS ===
async function loadKVRequests() {
  try {
    const resp = await fetch(`${R2_UPLOAD_WORKER}/deals/requests?password=deals2026&t=${Date.now()}`);
    if (!resp.ok) throw new Error('Failed');
    const requests = await resp.json();

    const badge = document.getElementById('requestsBadge');
    const undone = requests.filter(r => !r.done).length;
    if (undone > 0) { badge.textContent = undone; badge.style.display = 'inline'; }
    else { badge.style.display = 'none'; }

    if (requests.length === 0) {
      document.getElementById('requestsContent').innerHTML = '<span style="color:#555">אין בקשות</span>';
      return;
    }

    document.getElementById('requestsContent').innerHTML = requests.map(r => `
      <div style="background:#1a1a2e;padding:12px;border-radius:8px;margin-bottom:8px;text-align:right;display:flex;align-items:center;gap:10px">
        <div style="flex:1">
          <div><strong>${r.name || 'אנונימי'}</strong> ${r.phone ? `<span style="color:#888">📱 ${r.phone}</span>` : ''}</div>
          <div style="color:#ccc;margin-top:4px">${r.message}</div>
          <div style="color:#555;font-size:12px;margin-top:4px">${new Date(r.date).toLocaleString('he-IL')}</div>
        </div>
        ${r.phone ? `<a href="https://wa.me/${r.phone}?text=${encodeURIComponent('היי! לגבי הבקשה שלך - ')}" target="_blank" style="background:#25D366;color:#fff;padding:6px 12px;border-radius:8px;text-decoration:none;font-size:13px;white-space:nowrap">💬 השב</a>` : ''}
        <button onclick="deleteKVRequest('${r.id}')" style="background:#ef4444;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:13px">🗑</button>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('requestsContent').innerHTML = '<span style="color:#ef4444">שגיאה בטעינה</span>';
  }
}

async function deleteKVRequest(id) {
  if (!confirm('למחוק את הבקשה?')) return;
  await fetch(`${R2_UPLOAD_WORKER}/deals/requests?password=deals2026`, { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id }) });
  loadKVRequests();
  showToast('הבקשה נמחקה');
}

// === HELPERS ===
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

function generateId() {
  return todayStr() + '-' + Math.random().toString(36).substr(2, 6);
}

// === LOAD POSTS ===
async function loadPosts() {
  try {
    // Load from KV via Worker
    const resp = await fetch(`${R2_UPLOAD_WORKER}/deals/posts?t=${Date.now()}`);
    if (resp.ok) {
      posts = await resp.json();
    }
    // Fallback: check localStorage for migration
    if (posts.length === 0) {
      const local = localStorage.getItem('deals_posts');
      if (local) {
        posts = JSON.parse(local);
        // Auto-migrate to KV
        await savePostsToKV();
        localStorage.removeItem('deals_posts');
        showToast('פוסטים הועברו לענן');
      }
    }
    renderPostsList();
    updateStatus();
  } catch (err) {
    console.error('Load error:', err);
    showToast('שגיאה בטעינת פוסטים', true);
  }
}

function updateStatus() {
  const today = todayStr();
  const todayPosts = posts.filter(p => p.date === today);
  document.getElementById('statusBar').textContent =
    `סה"כ ${posts.length} פוסטים | היום: ${todayPosts.length} | אחרון: ${posts.length > 0 ? posts[0].date : '-'}`;
}

function renderPostsList() {
  const container = document.getElementById('postsList');

  if (posts.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px">אין פוסטים עדיין</div>';
    return;
  }

  // Sort by date desc
  const sorted = [...posts].sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));

  container.innerHTML = sorted.map(p => `
    <div class="post-item" data-id="${p.id}">
      <img class="post-thumb" src="${p.images && p.images[0] ? p.images[0] : ''}" alt="">
      <div class="post-info">
        <div class="post-brand">${p.type === 'brand' ? '&#x1F48E;' : '&#x1F525;'} ${p.brand}</div>
        <div class="post-title">${p.title}</div>
        <div class="post-meta">${p.date} &middot; &#x20AA;${p.price} &middot; ${(p.images||[]).length} תמונות</div>
      </div>
      <div class="post-actions">
        <button onclick="editPost('${p.id}')">&#x270F;&#xFE0F;</button>
        <button class="delete-btn" onclick="deletePost('${p.id}')">&#x1F5D1;</button>
      </div>
    </div>
  `).join('');
}

// === IMAGE UPLOAD ===
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('dragover');
});

uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('dragover');
});

uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', (e) => {
  handleFiles(e.target.files);
  fileInput.value = '';
});

async function handleFiles(files) {
  const fileArr = Array.from(files).filter(f => {
    if (f.type.startsWith('image/') || f.type.startsWith('video/')) {
      if (f.type.startsWith('video/') && f.size > 50 * 1024 * 1024) {
        showToast('וידאו מקסימום 50MB', true);
        return false;
      }
      return true;
    }
    return false;
  });

  // Add placeholders for all files
  const startIdx = uploadedImages.length;
  fileArr.forEach(f => {
    uploadedImages.push({ url: null, uploading: true, type: f.type.startsWith('video/') ? 'video' : 'image' });
  });
  renderImagePreviews();

  // Upload all in parallel
  await Promise.all(fileArr.map(async (file, i) => {
    const idx = startIdx + i;
    const mediaType = file.type.startsWith('video/') ? 'video' : 'image';
    try {
      const url = await uploadToR2(file);
      uploadedImages[idx] = { url, uploading: false, type: mediaType };
    } catch (err) {
      console.error('Upload error:', file.name, err);
      if (mediaType === 'image') {
        // Fallback: compress to small JPEG
        const url = await new Promise(resolve => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxW = 600;
            let w = img.width, h = img.height;
            if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
          img.src = URL.createObjectURL(file);
        });
        uploadedImages[idx] = { url, uploading: false, type: 'image' };
      } else {
        uploadedImages[idx] = { url: null, uploading: false, type: 'video' };
        showToast('שגיאה בהעלאת וידאו: ' + file.name, true);
      }
    }
    renderImagePreviews();
  }));
}

async function uploadToR2(file) {
  const ext = file.name.split('.').pop() || 'jpg';
  const key = `deals/${Date.now()}-${Math.random().toString(36).substr(2,6)}.${ext}`;

  // Upload raw binary via PUT to avoid FormData encoding issues
  try {
    const resp = await fetch(`${R2_UPLOAD_WORKER}/upload?key=${encodeURIComponent(key)}`, {
      method: 'PUT',
      headers: { 'Content-Type': file.type || 'image/jpeg' },
      body: file
    });
    if (resp.ok) {
      return `${R2_PUBLIC_URL}/${key}`;
    }
  } catch(e) {}

  // Fallback: compress to small JPEG data URL (max 600px, 60% quality)
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 600;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = URL.createObjectURL(file);
  });
}

function renderImagePreviews() {
  const container = document.getElementById('imagePreviews');
  container.innerHTML = uploadedImages.map((img, i) => {
    const isVideo = img.type === 'video';
    const placeholder = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%23222%22 width=%221%22 height=%221%22/></svg>';
    const media = isVideo && img.url
      ? `<video src="${img.url}" style="width:100%;height:100%;object-fit:cover" muted></video><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;opacity:0.8">&#x25B6;</div>`
      : `<img src="${img.url || placeholder}" alt="">`;
    return `<div class="img-preview" style="position:relative${i === 0 ? ';border:2px solid #FF6B00' : ''}">
      ${media}
      ${img.uploading ? '<div class="uploading-overlay"><div class="mini-spinner"></div></div>' : ''}
      <button class="remove-img" onclick="removeImage(${i})">&#x2715;</button>
      ${!img.uploading && i > 0 ? `<button onclick="setMainImage(${i})" style="position:absolute;bottom:2px;right:2px;width:22px;height:22px;border-radius:50%;background:rgba(255,107,0,0.85);border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center" title="הגדר כראשית">&#x2B50;</button>` : ''}
      ${i === 0 && !img.uploading ? '<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(255,107,0,0.85);color:#fff;font-size:9px;text-align:center;padding:1px;font-weight:700">ראשית</div>' : ''}
    </div>`;
  }).join('');
}

function removeImage(idx) {
  uploadedImages.splice(idx, 1);
  renderImagePreviews();
}

function setMainImage(idx) {
  const img = uploadedImages.splice(idx, 1)[0];
  uploadedImages.unshift(img);
  renderImagePreviews();
  showToast('התמונה הוגדרה כראשית');
}

// === PUBLISH ===
async function publishPost() {
  const type = document.getElementById('postType').value;
  const date = document.getElementById('postDate').value;
  const brand = document.getElementById('postBrand').value.trim();
  const title = document.getElementById('postTitle').value.trim();
  const price = parseInt(document.getElementById('postPrice').value) || 0;
  const link = document.getElementById('postLink').value.trim();
  const description = document.getElementById('postDescription').value.trim();

  if (!brand || !title || !link) {
    showToast('מלאו את כל השדות', true);
    return;
  }

  if (uploadedImages.some(img => img.uploading)) {
    // Force-finish stuck uploads after 30 seconds
    uploadedImages.forEach(img => { if (img.uploading) img.uploading = false; });
    renderImagePreviews();
    showToast('העלאות תקועות בוטלו, נסה שוב', true);
    return;
  }

  const images = uploadedImages.filter(img => img.url).map(img => img.type === 'video' ? 'video:' + img.url : img.url);

  const newPost = {
    id: generateId(),
    date,
    type,
    brand: brand.toUpperCase(),
    title,
    price,
    link,
    description,
    images
  };

  // Add to beginning
  posts.unshift(newPost);
  savePosts();

  showToast('הפוסט פורסם בהצלחה!');
  clearForm();
  renderPostsList();
  updateStatus();
}

// === SAVE POSTS ===
function savePosts() {
  savePostsToKV();
}

async function savePostsToKV() {
  try {
    const resp = await fetch(`${R2_UPLOAD_WORKER}/deals/posts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: ADMIN_PASSWORD, posts })
    });
    if (!resp.ok) throw new Error('Save failed');
  } catch(e) {
    console.error('KV save error:', e);
    showToast('שגיאה בשמירה לענן', true);
  }
}

// === DELETE / EDIT ===
function deletePost(id) {
  if (!confirm('למחוק את הפוסט?')) return;

  posts = posts.filter(p => p.id !== id);
  savePosts();

  showToast('הפוסט נמחק');
  renderPostsList();
  updateStatus();
}

function editPost(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;

  document.getElementById('postType').value = post.type;
  document.getElementById('postDate').value = post.date;
  document.getElementById('postBrand').value = post.brand;
  document.getElementById('postTitle').value = post.title;
  document.getElementById('postPrice').value = post.price;
  document.getElementById('postLink').value = post.link;
  document.getElementById('postDescription').value = post.description || '';

  uploadedImages = (post.images || []).map(url => {
    const isVideo = url.startsWith('video:');
    return { url: isVideo ? url.slice(6) : url, uploading: false, type: isVideo ? 'video' : 'image' };
  });
  renderImagePreviews();

  // Remove old post (will be re-added on publish)
  posts = posts.filter(p => p.id !== id);

  window.scrollTo({ top: 0, behavior: 'smooth' });
  showToast('עורכים פוסט - שנו ולחצו פרסום');
}

function clearForm() {
  document.getElementById('postBrand').value = '';
  document.getElementById('postTitle').value = '';
  document.getElementById('postPrice').value = '';
  document.getElementById('postLink').value = '';
  document.getElementById('postDescription').value = '';
  document.getElementById('postDate').value = todayStr();
  document.getElementById('postType').value = 'daily';
  uploadedImages = [];
  renderImagePreviews();
}

// === PRODUCT REQUESTS ===
function loadRequests() {
  const requests = JSON.parse(localStorage.getItem('deals_requests') || '[]');
  const container = document.getElementById('requestsList');
  const badge = document.getElementById('reqCountBadge');

  const newCount = requests.filter(r => r.status === 'new').length;
  badge.textContent = newCount;

  if (requests.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px">אין בקשות</div>';
    return;
  }

  container.innerHTML = requests.map(r => {
    const d = new Date(r.date);
    const dateStr = `${d.getDate()}/${d.getMonth()+1} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `
      <div class="req-item" data-id="${r.id}">
        <div class="req-header">
          <div>
            <span class="req-badge ${r.status}">${r.status === 'new' ? 'חדש' : 'טופל'}</span>
            <span class="req-name">${r.name}</span>
          </div>
          <span class="req-date">${dateStr}</span>
        </div>
        <div class="req-msg">${r.message}</div>
        ${r.phone ? `<div style="margin-top:4px;font-size:12px;color:rgba(255,255,255,0.4)">&#x1F4F1; ${r.phone}</div>` : ''}
        <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
          ${r.phone ? `<a href="https://wa.me/${r.phone}?text=${encodeURIComponent('היי ' + r.name + '! לגבי הבקשה שלך: ' + r.message + '\\n\\n')}" target="_blank" style="padding:5px 12px;border-radius:6px;border:none;font-size:12px;cursor:pointer;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;text-decoration:none;font-weight:700">&#x1F4AC; השב בוואטסאפ</a>` : ''}
          ${r.status === 'new' ? `<button onclick="markDone('${r.id}')" style="padding:5px 10px;border-radius:6px;border:none;font-size:11px;cursor:pointer;background:rgba(37,211,102,0.15);color:#25D366">&#x2705; טופל</button>` : ''}
          <button onclick="deleteRequest('${r.id}')" style="padding:5px 10px;border-radius:6px;border:none;font-size:11px;cursor:pointer;background:rgba(239,68,68,0.1);color:#ef4444">&#x1F5D1; מחק</button>
        </div>
      </div>
    `;
  }).join('');
}

function markDone(id) {
  const requests = JSON.parse(localStorage.getItem('deals_requests') || '[]');
  const req = requests.find(r => r.id === id);
  if (req) req.status = 'done';
  localStorage.setItem('deals_requests', JSON.stringify(requests));
  loadRequests();
}

function deleteRequest(id) {
  const requests = JSON.parse(localStorage.getItem('deals_requests') || '[]');
  localStorage.setItem('deals_requests', JSON.stringify(requests.filter(r => r.id !== id)));
  loadRequests();
}

function clearRequests() {
  if (!confirm('למחוק את כל הבקשות?')) return;
  localStorage.removeItem('deals_requests');
  loadRequests();
  showToast('כל הבקשות נמחקו');
}

// === INIT ===
if (localStorage.getItem('deals_admin') === '1') {
  showAdmin();
}
</script>
